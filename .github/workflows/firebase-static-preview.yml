name: Deploy static Firebase preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-static-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: firebase-static-preview
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ vars.FIREBASE_DEPLOYER_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment variables
        shell: bash
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$WIF_PROVIDER"
          test -n "$DEPLOYER_SERVICE_ACCOUNT"

      - name: Authenticate to Google Cloud with GitHub OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build the static preview
        run: |
          npm ci
          npm run firebase:prepare:static-preview

      - name: Publish a seven-day Firebase Hosting preview
        run: >-
          npx firebase-tools@15.24.0 --config firebase.static-preview.json
          hosting:channel:deploy static-preview --expires 7d
          --project "$FIREBASE_PROJECT_ID" --non-interactive
