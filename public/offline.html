<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#052e2b" />
    <title>Sowetamu Pro — Offline</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f8fafc;color:#0f172a;font-family:system-ui,sans-serif}.card{max-width:440px;padding:32px;border:1px solid #d1fae5;border-radius:24px;background:white;box-shadow:0 20px 50px #0f172a1a;text-align:center}.mark{width:64px;height:64px;margin:auto;display:grid;place-items:center;border-radius:18px;background:#052e2b;color:#6ee7b7;font-size:26px;font-weight:900}h1{font-size:22px;margin:20px 0 8px}p{font-size:14px;line-height:1.6;color:#475569}button{margin-top:14px;padding:11px 20px;border:0;border-radius:12px;background:#047857;color:white;font-weight:700;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">S</div>
      <h1>Internet connection required</h1>
      <p>The application shell is installed, but SACCO balances and financial records are never cached for offline use. Reconnect before viewing or recording transactions.</p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
